name: Daily 60s Bark Push

on:
  schedule:
    # 这里的 cron 是 UTC 时间。
    # 早上 8:00 北京时间 = UTC 时间 0:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你手动点击运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Push Script
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }} # 从 Secrets 中读取 Key
        run: python bark_60s.py
